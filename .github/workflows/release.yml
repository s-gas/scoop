name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Build for macOS (arm64)
        run: GOOS=darwin GOARCH=arm64 go build -o scoop-darwin-arm64 .

      - name: Build for macOS (amd64)
        run: GOOS=darwin GOARCH=amd64 go build -o scoop-darwin-amd64 .

      - name: Build for Linux (amd64)
        run: GOOS=linux GOARCH=amd64 go build -o scoop-linux-amd64 .

      - name: Build for Windows (amd64)
        run: GOOS=windows GOARCH=amd64 go build -o scoop-windows-amd64.exe .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: scoop-*
